<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="576" viewBox="0 0 1024 576">
  <!-- Background -->
  <rect width="1024" height="576" fill="#000000"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a3a1a" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="scanlines" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.03" />
      <stop offset="50%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.03" />
    </linearGradient>
  </defs>
  
  <!-- Grid background -->
  <rect width="1024" height="576" fill="url(#grid)"/>
  
  <!-- Scanlines effect -->
  <rect width="1024" height="576" fill="url(#scanlines)"/>
  
  <!-- Glow overlay -->
  <rect width="1024" height="576" fill="#000000" opacity="0.6"/>
  
  <!-- Border -->
  <rect x="30" y="30" width="964" height="516" fill="none" stroke="#22c55e" stroke-width="3"/>
  
  <!-- Header bar -->
  <rect x="30" y="30" width="964" height="70" fill="#000000" opacity="0.9"/>
  <line x1="30" y1="100" x2="994" y2="100" stroke="#22c55e" stroke-width="2"/>
  
  <!-- Terminal lights -->
  <circle cx="50" cy="50" r="4" fill="#ef4444"/>
  <circle cx="70" cy="50" r="4" fill="#eab308"/>
  <circle cx="90" cy="50" r="4" fill="#22c55e"/>
  
  <!-- Title -->
  <text x="110" y="62" font-family="Space Mono, monospace" font-size="24" font-weight="bold" fill="#22c55e" letter-spacing="2">
    arcade.griffen.codes
  </text>
  
  <!-- Main content -->
  <g>
    <!-- Joystick icon -->
    <text x="150" y="280" font-size="100" text-anchor="middle" opacity="0.7">
      🕹️
    </text>
    
    <!-- Title -->
    <text x="512" y="220" font-family="Space Mono, monospace" font-size="36" font-weight="bold" fill="#22c55e" text-anchor="middle" letter-spacing="1">
      THE ARCADE
    </text>
    
    <!-- Subtitle -->
    <text x="512" y="270" font-family="Space Mono, monospace" font-size="18" fill="#86efac" text-anchor="middle">
      38 Retro Games | Terminal Aesthetic
    </text>
    
    <!-- Call to action -->
    <text x="512" y="370" font-family="Space Mono, monospace" font-size="16" fill="#22c55e" text-anchor="middle" opacity="0.8" letter-spacing="0.5">
      &gt;&gt; PLAY NOW &lt;&lt;
    </text>
  </g>
  
  <!-- Game tags -->
  <g font-family="Space Mono, monospace" font-size="12" fill="#22c55e" opacity="0.6">
    <text x="50" y="450">[SNAKE] [2048] [PACMAN]</text>
    <text x="50" y="475">[HANGMAN] [WORDLE] [MINESWEEPER]</text>
  </g>
  
  <!-- Bottom accent line -->
  <line x1="100" y1="520" x2="924" y2="520" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
</svg>
