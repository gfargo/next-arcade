<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Grid pattern for terminal effect -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a3a1a" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="scanlines" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.03" />
      <stop offset="50%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.03" />
    </linearGradient>
  </defs>
  
  <!-- Grid background -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Scanlines effect -->
  <rect width="1200" height="630" fill="url(#scanlines)"/>
  
  <!-- Glow effect -->
  <rect width="1200" height="630" fill="#000000" opacity="0.7"/>
  
  <!-- Main container border -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.8"/>
  <rect x="42" y="42" width="1116" height="546" fill="none" stroke="#16a34a" stroke-width="1" opacity="0.4"/>
  
  <!-- Terminal header -->
  <rect x="40" y="40" width="1120" height="80" fill="#000000" opacity="0.8"/>
  <line x1="40" y1="120" x2="1160" y2="120" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
  
  <!-- Header text: Terminal indicator -->
  <g>
    <circle cx="60" cy="60" r="4" fill="#ef4444"/>
    <circle cx="80" cy="60" r="4" fill="#eab308"/>
    <circle cx="100" cy="60" r="4" fill="#22c55e"/>
  </g>
  
  <!-- Title -->
  <text x="130" y="75" font-family="Space Mono, monospace" font-size="28" font-weight="bold" fill="#22c55e" letter-spacing="2">
    $ THE ARCADE
  </text>
  
  <!-- Version info -->
  <text x="1080" y="75" font-family="Space Mono, monospace" font-size="14" fill="#22c55e" opacity="0.6" text-anchor="end">
    v1.0.0 | 38 Games
  </text>
  
  <!-- Main content area -->
  <g>
    <!-- Large joystick emoji -->
    <text x="200" y="300" font-size="120" text-anchor="middle" opacity="0.8">
      🕹️
    </text>
    
    <!-- Main tagline -->
    <text x="600" y="280" font-family="Space Mono, monospace" font-size="42" font-weight="bold" fill="#22c55e" text-anchor="middle" letter-spacing="1">
      RETRO TERMINAL GAMES
    </text>
    
    <!-- Description -->
    <text x="600" y="330" font-family="Space Mono, monospace" font-size="20" fill="#86efac" text-anchor="middle" opacity="0.9">
      A collection of classic arcade games with a retro aesthetic
    </text>
    
    <!-- Bottom tagline -->
    <text x="600" y="420" font-family="Space Mono, monospace" font-size="16" fill="#22c55e" text-anchor="middle" opacity="0.7" letter-spacing="0.5">
      &gt;&gt; INSERT COIN TO PLAY &lt;&lt;
    </text>
  </g>
  
  <!-- Decorative elements -->
  <g opacity="0.4" fill="none" stroke="#22c55e" stroke-width="1">
    <!-- Left side decorative lines -->
    <line x1="60" y1="160" x2="180" y2="160"/>
    <line x1="60" y1="180" x2="200" y2="180"/>
    <line x1="60" y1="200" x2="180" y2="200"/>
    
    <!-- Right side decorative lines -->
    <line x1="1020" y1="160" x2="1140" y2="160"/>
    <line x1="1000" y1="180" x2="1140" y2="180"/>
    <line x1="1020" y1="200" x2="1140" y2="200"/>
  </g>
  
  <!-- Cursor blink effect indicator -->
  <rect x="680" y="465" width="2" height="20" fill="#22c55e" opacity="0.8"/>
</svg>
